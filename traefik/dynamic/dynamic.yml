# Traefik dynamic routing — shortenUrl.
#   /:code         → SPA detail page (preview UI)
#   /go/:code      → API redirect + tracking
#   /api/*         → API REST endpoints
#   /metrics, /health → API observability
http:
  routers:
    # API: REST, metrics, health, AND go-redirects (/go/:code).
    api:
      rule: "PathPrefix(`/api`) || PathPrefix(`/metrics`) || PathPrefix(`/health`) || PathPrefix(`/go`)"
      entryPoints: [web]
      service: api

    # Observability UIs (profile-gated).
    grafana:
      rule: "PathPrefix(`/grafana`)"
      entryPoints: [web]
      service: grafana
    prometheus:
      rule: "PathPrefix(`/prometheus`)"
      entryPoints: [web]
      service: prometheus

    # SPA catch-all — /:code, /, /:code/analytics → client-side router.
    web:
      rule: "PathPrefix(`/`)"
      entryPoints: [web]
      service: web

  services:
    api:
      loadBalancer:
        servers:
          - url: "http://shorten-api:3000"
    web:
      loadBalancer:
        servers:
          - url: "http://shorten-web:80"
    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"
    prometheus:
      loadBalancer:
        servers:
          - url: "http://prometheus:9090"
