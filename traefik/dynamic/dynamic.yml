# Traefik dynamic routing — shortenUrl.
http:
  routers:
    # API: REST, metrics, health, AND short-code redirects (/:code).
    # PathRegexp matches nanoid-style codes (3-8 chars) so they go to the API
    # for redirect instead of being caught by the SPA catch-all.
    api:
      rule: "PathPrefix(`/api`) || PathPrefix(`/metrics`) || PathPrefix(`/health`) || PathRegexp(`^/[a-zA-Z0-9_-]{3,8}$`)"
      entryPoints: [web]
      service: api

    # Observability UIs (profile-gated — only reachable when services are up).
    grafana:
      rule: "PathPrefix(`/grafana`)"
      entryPoints: [web]
      service: grafana
    prometheus:
      rule: "PathPrefix(`/prometheus`)"
      entryPoints: [web]
      service: prometheus

    # SPA catch-all — lowest priority so API routes win.
    web:
      rule: "PathPrefix(`/`)"
      entryPoints: [web]
      service: web

  services:
    api:
      loadBalancer:
        servers:
          - url: "http://shorten-api:3000"
    web:
      loadBalancer:
        servers:
          - url: "http://shorten-web:80"
    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"
    prometheus:
      loadBalancer:
        servers:
          - url: "http://prometheus:9090"
